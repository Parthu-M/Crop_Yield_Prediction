{% extends "base.html" %}

{% block content %}
    <div class="prediction-form">
        <h2>Enter Crop Details</h2>
        <form method="POST" action="/">
            <div class="form-group">
                <label for="region">Region:</label>
                <select id="region" name="region" required>
                    {% for region in regions %}
                        <option value="{{ region }}">{{ region }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="soil_type">Soil Type:</label>
                <select id="soil_type" name="soil_type" required>
                    {% for soil in soil_types %}
                        <option value="{{ soil }}">{{ soil }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="crop">Crop Type:</label>
                <select id="crop" name="crop" required>
                    {% for crop in crops %}
                        <option value="{{ crop }}">{{ crop }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="rainfall">Rainfall (mm):</label>
                <input type="number" step="0.01" id="rainfall" name="rainfall" required>
            </div>
            
            <div class="form-group">
                <label for="temperature">Temperature (°C):</label>
                <input type="number" step="0.1" id="temperature" name="temperature" required>
            </div>
            
            <div class="form-group">
                <label for="weather">Weather Condition:</label>
                <select id="weather" name="weather" required>
                    {% for weather in weather_conditions %}
                        <option value="{{ weather }}">{{ weather }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="days_to_harvest">Days to Harvest:</label>
                <input type="number" id="days_to_harvest" name="days_to_harvest" required>
            </div>
            
            <div class="form-group checkbox">
                <input type="checkbox" id="fertilizer" name="fertilizer">
                <label for="fertilizer">Fertilizer Used</label>
            </div>
            
            <div class="form-group checkbox">
                <input type="checkbox" id="irrigation" name="irrigation">
                <label for="irrigation">Irrigation Used</label>
            </div>
            
            <button type="submit" class="btn-predict">Predict Yield</button>
        </form>
    </div>
{% endblock %}
